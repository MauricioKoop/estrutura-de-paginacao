<!doctype html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Paginação Customizada - ADS</title>
		<style>
			:root {
				--cor-borda: #ddd;
				--cor-azul: #007bff;
				--cor-hover: #e9ecef;
				--cor-texto: #333;
				--cor-marcador: #7a92a3;
			}

			body {
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				display: flex;
				flex-direction: column;
				align-items: center;
				padding: 50px 20px;
				background-color: #f4f4f9;
			}

			.secao-container {
				width: 100%;
				max-width: 500px;
				margin-bottom: 40px;
			}

			h2 {
				color: var(--cor-texto);
				font-weight: 400;
				margin-bottom: 20px;
				display: flex;
				align-items: center;
				font-size: 1.2rem;
			}

			h2::before {
				content: "•";
				color: var(--cor-marcador);
				font-size: 2rem;
				margin-right: 10px;
				line-height: 0;
			}

			.pagination-nav {
				user-select: none;
				background: #fff;
				padding: 40px;
				border: 1px solid #eee;
				display: flex;
				justify-content: center;
			}

			.pagination-list {
				display: flex;
				list-style: none;
				padding: 0;
				margin: 0;
				background: #fff;
				border-radius: 4px;
				overflow: hidden;
				box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
			}

			.pagination-list li {
				border: 1px solid var(--cor-borda);
			}

			.pagination-list li + li {
				border-left: none;
			}

			.pagination-list li a {
				display: block;
				padding: 12px 18px;
				text-decoration: none;
				color: var(--cor-azul);
				font-weight: 500;
				transition: all 0.2s ease;
			}

			.normal .pagination-list li a:hover {
				background-color: var(--cor-hover);
				color: #0056b3;
			}

			.com-hover .pagination-list li a:hover {
				background-color: transparent;
				cursor: default;
			}

			.com-hover .pagination-list li:nth-child(3) a {
				background-color: var(--cor-hover);
				color: #6c757d;
			}

			.pagination-list li:first-child {
				border-top-left-radius: 4px;
				border-bottom-left-radius: 4px;
			}

			.pagination-list li:last-child {
				border-top-right-radius: 4px;
				border-bottom-right-radius: 4px;
			}
		</style>
	</head>
	<body>
		<div class="secao-container normal">
			<h2>Normal</h2>
			<nav class="pagination-nav">
				<ul class="pagination-list">
					<li><a href="#">&laquo;</a></li>
					<li><a href="#">1</a></li>
					<li><a href="#">2</a></li>
					<li><a href="#">3</a></li>
					<li><a href="#">&raquo;</a></li>
				</ul>
			</nav>
		</div>

		<div class="secao-container com-hover">
			<h2>Quando passar o mouse</h2>
			<nav class="pagination-nav">
				<ul class="pagination-list">
					<li><a href="#">&laquo;</a></li>
					<li><a href="#">1</a></li>
					<li><a href="#">2</a></li>
					<li><a href="#">3</a></li>
					<li><a href="#">&raquo;</a></li>
				</ul>
			</nav>
		</div>
	</body>
</html>
